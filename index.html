<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/index.css">
    <script type="module" src="src/main.js" defer></script>
    <script src="https://kit.fontawesome.com/4028a43f77.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="main_header header" id="main_header">
        <button class="toggle-menu_btn icon_btn" id="toggle-menu_btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <p class="subheading">What tasks do you have</p>
        <h1 class="branding">To-do</h1>

        <button class="account_btn icon_btn" id="account_btn">
            <i class="fa-regular fa-circle-user"></i>
        </button>
    </header>

    <div class="menu_backdrop" id="menu_backdrop"></div>
    <div class="menu_tab" id="menu_tab">
        <button class="close_menu_btn icon_btn" id="close_menu_btn">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <ul class="tasks-list">
    </ul>

    <div class="add_backdrop" id="add_backdrop"></div>
    <div class="add_tab" id="add_tab">
        <button class="toggle_btn icon_btn" id="toggle_btn">
            <i class="fa fa-plus"></i>
        </button>

        <form class="add_form" id="add_form">
            <input name="task_text" type="text" class="new_task__text" placeholder="Add your task" autocomplete="off"
                required>
            <div class="buttons">
                <button class="add_btn btn" id="add_btn" type="submit">
                    Add
                </button>
                <button class="cancel_btn btn" id="cancel_btn" type="reset">
                    Cancel
                </button>
            </div>

        </form>
    </div>
</body>

</html>

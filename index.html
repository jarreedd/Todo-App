<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <script type="module" src="src/script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main_header header" id="main_header">
        <p>What tasks do you have</p>
        <h1>To-do</h1>

    </header>

    <form class="add_form" id="add_form">
        <input name="task_text" type="text" class="input-newTask" placeholder="Add your task" autocomplete="off"
            required>

        <button class="add-btn btn">
            Add
        </button>
    </form>

    <ul class="tasks-list">
    </ul>

</body>

</html>
